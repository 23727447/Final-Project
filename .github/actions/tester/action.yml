name: "Test App"
description: "Check if app is running"

runs:
  using: "composite"
  steps:
    - run: |
        echo "Testing app inside container..."

        CONTAINER_ID=$(docker ps -q)

        for i in {1..10}; do
          docker exec $CONTAINER_ID curl http://localhost:8000 && exit 0
          echo "Retrying..."
          sleep 3
        done

        echo "App failed"
        exit 1
      shell: bash