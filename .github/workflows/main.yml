name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker
        run: docker build -t myapp .

      - name: Run container
        run: docker run -d -p 8000:8000 -e DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }} myapp

      - name: Show logs
        run: docker logs $(docker ps -aq | head -n 1)

      - name: Test app
        run: |
          sleep 10
          curl http://localhost:8000