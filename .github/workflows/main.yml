name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Get code
        uses: actions/checkout@v3

      # Step 2: Build Docker image
      - name: Build Docker
        run: docker build -t myapp .

      # Step 3: Run container
      - name: Run container
        run: docker run -d -p 8000:8000 -e DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }} myapp

      # Step 4: Wait for app to start
      - name: Wait for app
        run: sleep 10

      # Step 5: Test app INSIDE container (fix networking issue)
      - name: Test app
        run: docker exec $(docker ps -q) curl http://localhost:8000